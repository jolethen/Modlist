name: Bulk Submodule Unpack and Release
on: 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate_mods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Register and Unpack Submodules
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "Mod Bot"
          
          # 1. Add submodules from mods.txt
          while IFS= read -r url || [ -n "$url" ]; do
            [ -z "$url" ] && continue
            url=$(echo "$url" | tr -d '\r' | xargs)
            folder_name=$(basename "$url" .git)
            
            echo "Adding $folder_name..."
            # Force remove if directory exists to prevent "already exists" crashes
            rm -rf "$folder_name"
            git submodule add --force "$url" "$folder_name"
          done < mods.txt
          
          # 2. Initialize and download code
          git submodule update --init --recursive

          # 3. Commit the changes to your repo .gitmodules
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Robot: Update submodules list"
            git push
          fi

      - name: Prepare ZIP for Release
        run: |
          # 4. Remove internal .git folders so the ZIP contains raw files/folders
          # mindepth 2 ensures we don't delete the main repository's .git
          find . -mindepth 2 -name ".git" -exec rm -rf {} +
          
          # 5. ZIP everything excluding workflow files and the list
          zip -r modset_unpacked.zip . -x "*.git*" ".github/*" "mods.txt" ".gitignore"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "migration-v${{ github.run_number }}"
          name: "Migrated Modset #${{ github.run_number }}"
          body: "Complete unpacked mod set for server migration."
          files: modset_unpacked.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
